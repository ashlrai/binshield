name: BinShield Example

on:
  pull_request:

jobs:
  binshield:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          api-base-url: https://api.binshield.dev
          github-token: ${{ github.token }}
          working-directory: .
          scan-mode: native-only
          comment-mode: both
          fail-on: high
