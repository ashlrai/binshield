name: "BinShield — Binary Supply Chain Scanner"
description: "Decompile native package binaries, classify behavior with AI, and block risky compiled code in CI."
author: "Ashlr AI"
branding:
  icon: "shield"
  color: "green"
inputs:
  api-key:
    description: "BinShield API key"
    required: false
  github-token:
    description: "GitHub token used for PR comments"
    required: false
  api-base-url:
    description: "BinShield API base URL"
    required: false
    default: "https://binshieldapi-production.up.railway.app"
  working-directory:
    description: "Repository path to inspect"
    required: false
    default: "."
  scan-mode:
    description: "Dependency scan mode: native-only or all-dependencies"
    required: false
    default: "native-only"
  include-dev-dependencies:
    description: "Include devDependencies from the lockfile"
    required: false
    default: "false"
  register-dependencies:
    description: "Register this repo's dependencies with BinShield so the org is alerted if any are later flagged malicious"
    required: false
    default: "false"
  fail-on:
    description: "Risk threshold: critical, high, medium, low, never"
    required: false
    default: "high"
  comment-mode:
    description: "Output mode: summary, pr-comment, both, off"
    required: false
    default: "summary"
  poll-interval-ms:
    description: "Polling interval in milliseconds"
    required: false
    default: "1500"
  timeout-ms:
    description: "Polling timeout in milliseconds"
    required: false
    default: "120000"
  max-targets:
    description: "Maximum dependency targets to scan"
    required: false
    default: "50"
outputs:
  total-scanned:
    description: "Number of packages scanned"
  highest-risk:
    description: "Highest risk level found (none, low, medium, high, critical)"
  failed:
    description: "Whether the action failed due to risk threshold ('true' or 'false')"
runs:
  using: "node20"
  main: "dist/apps/github-action/src/index.js"
