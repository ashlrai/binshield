name: "BinShield Supply Chain Scanner"
description: "Detect malicious install-script worms and scan native binaries (.node/.so/.dylib) with AI-powered risk scoring."
author: "Ashlr AI"
branding:
  icon: "shield"
  color: "red"

inputs:
  api-key:
    description: "BinShield API key (from binshield.dev). Enables authenticated scans with higher rate limits and proactive alerting."
    required: false
  github-token:
    description: "GitHub token used to post PR comments with scan results. Pass secrets.GITHUB_TOKEN."
    required: false
  api-base-url:
    description: "BinShield API base URL. Override only when using a self-hosted instance."
    required: false
    default: "https://api.binshield.dev"
  working-directory:
    description: "Path to the repository root to inspect. Must contain a package.json and package-lock.json."
    required: false
    default: "."
  scan-mode:
    description: "Dependency scan scope. 'native-only' targets packages with install scripts, .gyp files, or platform binaries. 'all-dependencies' scans every lockfile entry."
    required: false
    default: "native-only"
  include-dev-dependencies:
    description: "When 'true', devDependencies from the lockfile are included in the scan."
    required: false
    default: "false"
  register-dependencies:
    description: "When 'true', registers this repo's dependencies with BinShield so your org is alerted if any package is later flagged malicious by the registry feed."
    required: false
    default: "false"
  fail-on:
    description: "Minimum risk level that causes the action to fail. One of: critical, high, medium, low, never."
    required: false
    default: "high"
  comment-mode:
    description: "Where to publish the scan report. One of: summary (workflow summary), pr-comment (PR comment), both, off."
    required: false
    default: "summary"
  sarif-file:
    description: "Relative path (from working-directory) where BinShield writes a SARIF 2.1.0 file. Use with github/codeql-action/upload-sarif to surface findings in the Security tab."
    required: false
  poll-interval-ms:
    description: "Milliseconds to wait between status polls while a real-time analysis is in progress."
    required: false
    default: "1500"
  timeout-ms:
    description: "Maximum milliseconds to wait for all analyses to complete before timing out."
    required: false
    default: "120000"
  max-targets:
    description: "Maximum number of dependency targets to scan in a single run. Prevents runaway scans on very large lockfiles."
    required: false
    default: "50"

outputs:
  total-scanned:
    description: "Total number of packages scanned in this run."
  highest-risk:
    description: "Highest risk level found across all scanned packages. One of: none, low, medium, high, critical."
  failed:
    description: "Whether the action exited with failure due to the risk threshold. Either 'true' or 'false'."
  sarif-file:
    description: "Absolute path to the written SARIF 2.1.0 file. Populated only when the sarif-file input is provided."

runs:
  using: "node20"
  main: "dist/apps/github-action/src/index.js"
